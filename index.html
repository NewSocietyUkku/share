<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Call & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; overflow: hidden; }
        
        /* Sidebar Chat Styling */
        #chat-container { width: 300px; background: white; border-right: 1px solid #ccc; display: flex; flex-direction: column; height: 100%; }
        #chat-header { padding: 10px; background: #007bff; color: white; display: flex; justify-content: space-between; align-items: center; }
        #chat-frame { flex-grow: 1; border: none; width: 100%; }
        .refresh-chat { cursor: pointer; background: #0056b3; border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; }

        /* Main Call Area */
        #main-app { flex-grow: 1; padding: 20px; overflow-y: auto; text-align: center; }
        .controls { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 450px; }
        .video-box { background: #000; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        video { width: 100%; display: block; background: #000; min-height: 180px; }
        input { padding: 12px; width: 90%; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        
        .action-btns { display: flex; justify-content: space-between; gap: 5px; margin-top: 10px; }
        button { padding: 12px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-video { background: #007bff; flex: 1; }
        .btn-voice { background: #28a745; flex: 1; }
        .btn-end { background: #dc3545; flex: 1; display: none; }
        .copy-btn { background: #6c757d; padding: 5px 10px; font-size: 12px; margin-top: 5px; }
        
        #my-id { font-family: monospace; color: #d63384; font-weight: bold; font-size: 1.4em; }

        /* Mobile View Fix */
        @media (max-width: 600px) {
            body { flex-direction: column; overflow-y: auto; }
            #chat-container { width: 100%; height: 300px; border-right: none; border-bottom: 1px solid #ccc; }
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">
            <span>Family Chat</span>
            <button class="refresh-chat" onclick="refreshChat()">Refresh</button>
        </div>
        <iframe id="chat-frame" src="https://www3.smartgb.com/g/g.php?a=s&i=g36-32432-84"></iframe>
    </div>

    <div id="main-app">
        <div class="controls">
            <h2>Family Call</h2>
            <p>Your ID: <span id="my-id">...</span><br>
               <button class="copy-btn" onclick="copyId()">Copy ID</button>
            </p>
            
            <input type="text" id="call-to-id" placeholder="Paste ID here">
            
            <div class="action-btns">
                <button id="video-btn" class="btn-video">📹 Video</button>
                <button id="voice-btn" class="btn-voice">📞 Voice</button>
                <button id="end-btn" class="btn-end">🚫 End</button>
            </div>
        </div>

        <div style="max-width: 450px; margin: 0 auto;">
            <small>Family (Remote)</small>
            <div class="video-box"><video id="remote-video" autoplay playsinline></video></div>
            <br>
            <small>You (Local)</small>
            <div class="video-box"><video id="local-video" autoplay muted playsinline></video></div>
        </div>
    </div>

    <script>
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const endBtn = document.getElementById('end-btn');
        const myIdDisplay = document.getElementById('my-id');
        
        let localStream;
        let currentCall;

        // 5-digit ID Generator
        function generateId(len) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let id = '';
            for (let i = 0; i < len; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
            return id;
        }

        const peer = new Peer(generateId(5)); 
        peer.on('open', id => myIdDisplay.innerText = id);
        peer.on('error', (err) => { if (err.type === 'unavailable-id') window.location.reload(); });

        // Setup Media
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true })
            .then(stream => {
                localStream = stream;
                localVideo.srcObject = stream;
                peer.on('call', call => {
                    const isVid = call.metadata ? call.metadata.video : true;
                    toggleVideo(isVid);
                    call.answer(localStream);
                    handleCall(call);
                });
            }).catch(e => alert("Camera blocked or not found."));

        function makeCall(isVideo) {
            const targetId = document.getElementById('call-to-id').value.toLowerCase().trim();
            if (!targetId) return alert("Enter ID!");
            toggleVideo(isVideo);
            const call = peer.call(targetId, localStream, { metadata: { video: isVideo } });
            handleCall(call);
        }

        function handleCall(call) {
            currentCall = call;
            endBtn.style.display = "inline-block";
            call.on('stream', s => remoteVideo.srcObject = s);
            call.on('close', hangUp);
        }

        function toggleVideo(on) {
            if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = on);
        }

        function hangUp() {
            if (currentCall) currentCall.close();
            remoteVideo.srcObject = null;
            endBtn.style.display = "none";
        }

        function refreshChat() {
            document.getElementById('chat-frame').src = document.getElementById('chat-frame').src;
        }

        function copyId() {
            navigator.clipboard.writeText(myIdDisplay.innerText);
            alert("Copied: " + myIdDisplay.innerText);
        }

        document.getElementById('video-btn').addEventListener('click', () => makeCall(true));
        document.getElementById('voice-btn').addEventListener('click', () => makeCall(false));
        endBtn.addEventListener('click', hangUp);
    </script>
</body>
</html>
