<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Text Board</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background-color: #f4f4f9; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .box-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 8px; box-sizing: border-box; resize: vertical; }
        button { padding: 8px 16px; margin-right: 5px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-save { background-color: #28a745; }
        .btn-clear { background-color: #dc3545; }
        #status { text-align: center; margin-bottom: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Shared Text Board</h1>
    <div id="status">Loading data...</div>

    <div class="grid">
        <div class="box-container">
            <h3>Box 1</h3>
            <textarea id="box1"></textarea>
            <button class="btn-save" onclick="updateData('box1')">Save Box 1</button>
            <button class="btn-clear" onclick="clearData('box1')">Clear</button>
        </div>
        <div class="box-container">
            <h3>Box 2</h3>
            <textarea id="box2"></textarea>
            <button class="btn-save" onclick="updateData('box2')">Save Box 2</button>
            <button class="btn-clear" onclick="clearData('box2')">Clear</button>
        </div>
        <div class="box-container">
            <h3>Box 3</h3>
            <textarea id="box3"></textarea>
            <button class="btn-save" onclick="updateData('box3')">Save Box 3</button>
            <button class="btn-clear" onclick="clearData('box3')">Clear</button>
        </div>
        <div class="box-container">
            <h3>Box 4</h3>
            <textarea id="box4"></textarea>
            <button class="btn-save" onclick="updateData('box4')">Save Box 4</button>
            <button class="btn-clear" onclick="clearData('box4')">Clear</button>
        </div>
    </div>

    <script>
        // --- YOUR AIRTABLE CREDENTIALS GO HERE ---
        const AIRTABLE_PAT = 'YOUR_PERSONAL_ACCESS_TOKEN'; 
        const BASE_ID = 'YOUR_BASE_ID'; 
        const TABLE_NAME = 'SharedText'; 
        // -----------------------------------------

        const API_URL = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`;
        let recordId = ''; // We need the specific row ID to update it

        const headers = {
            'Authorization': `Bearer ${AIRTABLE_PAT}`,
            'Content-Type': 'application/json'
        };

        // Load data when the page opens
        async function loadData() {
            try {
                const response = await fetch(API_URL, { headers });
                const data = await response.json();
                
                if (data.records && data.records.length > 0) {
                    const record = data.records[0];
                    recordId = record.id; // Save row ID for updates
                    
                    document.getElementById('box1').value = record.fields.box1 || '';
                    document.getElementById('box2').value = record.fields.box2 || '';
                    document.getElementById('box3').value = record.fields.box3 || '';
                    document.getElementById('box4').value = record.fields.box4 || '';
                    document.getElementById('status').innerText = "Data loaded successfully!";
                    setTimeout(() => document.getElementById('status').innerText = "", 3000);
                } else {
                    document.getElementById('status').innerText = "Error: No rows found in Airtable.";
                }
            } catch (error) {
                document.getElementById('status').innerText = "Failed to load data.";
                console.error(error);
            }
        }

        // Save data to Airtable
        async function updateData(boxId) {
            if (!recordId) return alert("Please wait for data to load first.");
            
            document.getElementById('status').innerText = "Saving...";
            const textValue = document.getElementById(boxId).value;
            
            const payload = {
                fields: {
                    [boxId]: textValue
                }
            };

            try {
                const response = await fetch(`${API_URL}/${recordId}`, {
                    method: 'PATCH',
                    headers: headers,
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    document.getElementById('status').innerText = "Saved!";
                    setTimeout(() => document.getElementById('status').innerText = "", 2000);
                } else {
                    throw new Error("Failed to save");
                }
            } catch (error) {
                document.getElementById('status').innerText = "Error saving data.";
                console.error(error);
            }
        }

        // Clear data locally and in Airtable
        function clearData(boxId) {
            document.getElementById(boxId).value = '';
            updateData(boxId); // Instantly save the empty state
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
